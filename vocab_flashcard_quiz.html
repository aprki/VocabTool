<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>單字大師 · Vocab Master</title>
<style>
  :root {
    --navy-950: #0a1628;
    --navy-900: #0f2038;
    --navy-800: #16304f;
    --navy-700: #1e3f66;
    --navy-600: #2a5182;
    --gold-500: #c9a24b;
    --gold-400: #d9bb6f;
    --gold-300: #e8d49a;
    --cream: #f4efe4;
    --green: #4caf7d;
    --red: #d9694f;
    --shadow: 0 12px 32px rgba(10,22,40,0.35);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: linear-gradient(160deg, var(--navy-950) 0%, var(--navy-900) 55%, var(--navy-800) 100%);
    color: var(--cream);
    font-family: "Noto Sans TC", "Noto Sans CJK TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
    min-height: 100vh;
  }
  #app { max-width: 780px; margin: 0 auto; padding: 28px 18px 60px; min-height: 100vh; }

  .brandbar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 22px;
  }
  .brand {
    display: flex; align-items: center; gap: 10px;
  }
  .brand-mark {
    width: 34px; height: 34px; border-radius: 8px;
    background: linear-gradient(135deg, var(--gold-400), var(--gold-500));
    display:flex; align-items:center; justify-content:center;
    font-weight:700; color: var(--navy-950); font-size:16px;
    box-shadow: 0 4px 12px rgba(201,162,75,0.35);
  }
  .brand-name { font-size: 15px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold-300); font-weight: 600; }
  .stat-pill {
    font-size: 12px; color: var(--navy-950); background: var(--gold-400);
    padding: 4px 12px; border-radius: 999px; font-weight: 700; letter-spacing: .02em;
  }

  h1 { font-size: 26px; margin: 4px 0 6px; color: var(--cream); letter-spacing: 0.01em; }
  .sub { color: #9fb2c8; font-size: 14px; margin-bottom: 26px; line-height:1.6; }

  .card-panel {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(201,162,75,0.18);
    border-radius: 18px;
    padding: 22px;
    margin-bottom: 18px;
    box-shadow: var(--shadow);
  }

  .section-title {
    font-size: 12px; text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--gold-400); font-weight: 700; margin-bottom: 14px;
    display:flex; align-items:center; gap:8px;
  }
  .section-title::after { content:""; flex:1; height:1px; background: rgba(201,162,75,0.25); }

  /* Mode selector */
  .mode-grid { display:grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 4px; }
  .mode-btn {
    background: rgba(255,255,255,0.02);
    border: 1.5px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 16px 12px;
    color: var(--cream);
    cursor: pointer;
    text-align:left;
    transition: all .15s ease;
  }
  .mode-btn:hover { border-color: rgba(201,162,75,0.5); background: rgba(201,162,75,0.06); }
  .mode-btn.active {
    border-color: var(--gold-500);
    background: rgba(201,162,75,0.14);
    box-shadow: 0 0 0 1px rgba(201,162,75,0.3) inset;
  }
  .mode-btn .icon { font-size: 22px; margin-bottom: 8px; display:block; }
  .mode-btn .title { font-weight: 700; font-size: 15px; margin-bottom: 3px; }
  .mode-btn .desc { font-size: 12px; color: #9fb2c8; }

  /* list picker */
  .quick-actions { display:flex; gap:8px; margin-bottom: 14px; flex-wrap: wrap; }
  .chip-btn {
    background: rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1);
    color: var(--gold-300); font-size: 12.5px; padding: 6px 12px; border-radius: 999px;
    cursor:pointer; transition: all .15s;
  }
  .chip-btn:hover { border-color: var(--gold-500); background: rgba(201,162,75,0.1); }

  .list-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(64px, 1fr));
    gap: 8px; max-height: 260px; overflow-y: auto; padding-right: 4px;
  }
  .list-grid::-webkit-scrollbar { width: 6px; }
  .list-grid::-webkit-scrollbar-thumb { background: rgba(201,162,75,0.3); border-radius: 3px; }

  .list-chip {
    position: relative;
    text-align: center;
    padding: 8px 4px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.02);
    cursor: pointer;
    font-size: 12.5px;
    font-weight: 600;
    color: #b9c7d8;
    user-select: none;
    transition: all .12s;
  }
  .list-chip:hover { border-color: rgba(201,162,75,0.4); }
  .list-chip.selected {
    background: linear-gradient(135deg, rgba(201,162,75,0.22), rgba(201,162,75,0.08));
    border-color: var(--gold-500);
    color: var(--gold-300);
  }
  .list-chip .count { display:block; font-size: 9.5px; font-weight: 400; color: #6f8296; margin-top:1px; }
  .list-chip.selected .count { color: var(--gold-400); }

  .direction-row { display:flex; gap: 10px; margin-top: 14px; }
  .radio-pill {
    flex:1; padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.02); text-align:center; font-size: 13px; cursor:pointer;
    color:#b9c7d8; transition: all .12s;
  }
  .radio-pill.selected { border-color: var(--gold-500); color: var(--gold-300); background: rgba(201,162,75,0.1); }

  .start-btn {
    width: 100%; margin-top: 20px;
    background: linear-gradient(135deg, var(--gold-400), var(--gold-500));
    color: var(--navy-950); border:none; border-radius: 14px;
    padding: 16px; font-size: 16px; font-weight: 700; letter-spacing: 0.02em;
    cursor: pointer; box-shadow: 0 8px 20px rgba(201,162,75,0.25);
    transition: transform .1s;
  }
  .start-btn:active { transform: scale(0.98); }
  .start-btn:disabled { opacity: 0.4; cursor: not-allowed; box-shadow:none; }

  /* study header */
  .study-top { display:flex; align-items:center; justify-content:space-between; margin-bottom: 14px; gap: 10px;}
  .back-link {
    color: var(--gold-300); font-size: 13px; cursor:pointer; display:flex; align-items:center; gap:5px;
    background:none; border:none; font-family:inherit;
  }
  .progress-wrap { flex:1; margin: 0 14px; }
  .progress-bar { height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow:hidden; }
  .progress-fill { height:100%; background: linear-gradient(90deg, var(--gold-500), var(--gold-300)); border-radius: 3px; transition: width .25s ease; }
  .progress-text { font-size: 11px; color:#8296ab; margin-top:5px; text-align:right; }
  .score-tag { font-size: 13px; font-weight:700; color: var(--gold-300); white-space:nowrap; }

  /* flashcard */
  .flash-wrap { perspective: 1400px; margin: 30px 0 18px; }
  .flash-card {
    position: relative; width: 100%; min-height: 300px;
    transform-style: preserve-3d; transition: transform .5s cubic-bezier(.4,.2,.2,1);
    cursor: pointer;
  }
  .flash-card.flipped { transform: rotateY(180deg); }
  .flash-face {
    position: absolute; inset:0; backface-visibility: hidden;
    border-radius: 20px; display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding: 30px; text-align:center;
    border: 1px solid rgba(201,162,75,0.25);
    box-shadow: var(--shadow);
  }
  .flash-front {
    background: linear-gradient(160deg, var(--navy-800), var(--navy-700));
  }
  .flash-back {
    background: linear-gradient(160deg, var(--navy-700), var(--navy-600));
    transform: rotateY(180deg);
  }
  .flash-word { font-size: 34px; font-weight: 800; color: var(--gold-300); letter-spacing: 0.01em; word-break: break-word;}
  .flash-hint { font-size: 12px; color:#8296ab; margin-top:14px; }
  .flash-pos {
    display:inline-block; font-size:12px; padding:3px 12px; border-radius:999px;
    background: rgba(201,162,75,0.18); color: var(--gold-300); margin-bottom: 14px; font-weight:700;
  }
  .flash-meaning { font-size: 26px; font-weight: 700; color: var(--cream); line-height:1.5; }
  .flash-list-tag { position:absolute; top:14px; left:18px; font-size:11px; color:#6f8296; font-weight:600; }

  .flash-controls { display:flex; gap:10px; margin-top: 6px; }
  .ctrl-btn {
    flex:1; padding: 13px; border-radius: 12px; border:1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.03); color: var(--cream); font-size:14px; font-weight:600; cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:6px;
    transition: all .12s;
  }
  .ctrl-btn:hover { border-color: rgba(201,162,75,0.4); background: rgba(201,162,75,0.07); }
  .ctrl-btn.primary { background: linear-gradient(135deg, var(--gold-400), var(--gold-500)); color: var(--navy-950); border:none; }
  .ctrl-btn.know { border-color: rgba(76,175,125,0.4); }
  .ctrl-btn.know:hover { background: rgba(76,175,125,0.12); }
  .ctrl-btn.dontknow { border-color: rgba(217,105,79,0.4); }
  .ctrl-btn.dontknow:hover { background: rgba(217,105,79,0.12); }

  .shuffle-toggle { font-size:12px; color:#8296ab; text-align:center; margin-top:10px; cursor:pointer; }
  .shuffle-toggle.active { color: var(--gold-400); font-weight:700; }

  /* quiz */
  .quiz-q { text-align:center; margin: 18px 0 26px; }
  .quiz-word-tag { font-size:12px; color:#8296ab; text-transform:uppercase; letter-spacing:.12em; margin-bottom:10px; }
  .quiz-word { font-size: 32px; font-weight: 800; color: var(--gold-300); word-break: break-word; }
  .quiz-word.small { font-size: 22px; font-weight:700; color: var(--cream); line-height:1.5;}
  .quiz-pos { font-size:13px; color:#8296ab; margin-top:6px; }

  .options { display:flex; flex-direction:column; gap:10px; }
  .option-btn {
    text-align:left; padding: 15px 16px; border-radius: 13px;
    border: 1.5px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.02);
    color: var(--cream); font-size: 15px; cursor:pointer; transition: all .12s;
    line-height:1.5;
  }
  .option-btn:hover:not(.locked) { border-color: rgba(201,162,75,0.5); background: rgba(201,162,75,0.06); }
  .option-btn.correct { border-color: var(--green); background: rgba(76,175,125,0.16); color:#c9ecd8; }
  .option-btn.wrong { border-color: var(--red); background: rgba(217,105,79,0.16); color:#f2cec4; }
  .option-btn.locked { cursor: default; }
  .option-btn .letter {
    display:inline-block; width:22px; height:22px; border-radius:6px; background: rgba(255,255,255,0.08);
    text-align:center; line-height:22px; font-size:12px; font-weight:700; margin-right:10px; color: var(--gold-300);
  }

  .quiz-next {
    margin-top: 18px; width:100%; padding:15px; border-radius:13px; border:none;
    background: linear-gradient(135deg, var(--gold-400), var(--gold-500)); color: var(--navy-950);
    font-size:15px; font-weight:700; cursor:pointer; opacity:0; pointer-events:none; transition: opacity .2s;
  }
  .quiz-next.show { opacity:1; pointer-events:auto; }

  /* summary */
  .summary-hero { text-align:center; padding: 30px 10px; }
  .summary-score { font-size: 54px; font-weight: 800; color: var(--gold-300); }
  .summary-label { color:#9fb2c8; font-size: 14px; margin-top:6px; }
  .review-list { max-height: 320px; overflow-y:auto; margin-top: 8px; }
  .review-item {
    display:flex; justify-content:space-between; align-items:center;
    padding: 12px 14px; border-radius: 12px; margin-bottom: 8px;
    background: rgba(217,105,79,0.08); border:1px solid rgba(217,105,79,0.25);
  }
  .review-item .w { font-weight:700; color: var(--gold-300); }
  .review-item .m { font-size:13px; color:#dfe6ee; text-align:right; }

  .hidden { display:none !important; }

  @media (max-width:480px){
    .flash-word{font-size:28px;}
    .flash-meaning{font-size:22px;}
    .summary-score{font-size:44px;}
  }
</style>
</head>
<body>
<div id="app">

  <div class="brandbar">
    <div class="brand">
      <div class="brand-mark">V</div>
      <div class="brand-name">Vocab Master</div>
    </div>
    <div class="stat-pill" id="totalCountPill">2538 words</div>
  </div>

  <!-- SETUP SCREEN -->
  <div id="setupScreen">
    <h1>單字自我測驗</h1>
    <div class="sub">選擇範圍與模式，開始背單字或考自己。可切換 Flashcard 卡片背誦，或選擇題自我測驗。</div>

    <div class="card-panel">
      <div class="section-title">模式 Mode</div>
      <div class="mode-grid">
        <div class="mode-btn active" data-mode="flashcard">
          <span class="icon">🗂️</span>
          <div class="title">Flashcard</div>
          <div class="desc">單字卡背誦，點擊翻面看解釋</div>
        </div>
        <div class="mode-btn" data-mode="quiz">
          <span class="icon">✅</span>
          <div class="title">選擇題測驗</div>
          <div class="desc">四選一，立即得知對錯與分數</div>
        </div>
      </div>

      <div id="directionBlock" class="hidden">
        <div class="direction-row">
          <div class="radio-pill selected" data-dir="w2m">看單字選中文</div>
          <div class="radio-pill" data-dir="m2w">看中文選單字</div>
        </div>
      </div>
    </div>

    <div class="card-panel">
      <div class="section-title">範圍 Lists</div>
      <div class="quick-actions">
        <div class="chip-btn" id="selectAllBtn">全選</div>
        <div class="chip-btn" id="selectNoneBtn">清空</div>
        <div class="chip-btn" id="selectRandom5Btn">隨機 5 個 List</div>
      </div>
      <div class="list-grid" id="listGrid"></div>
    </div>

    <button class="start-btn" id="startBtn">開始測驗 →</button>
  </div>

  <!-- FLASHCARD SCREEN -->
  <div id="flashScreen" class="hidden">
    <div class="study-top">
      <button class="back-link" id="flashBackBtn">← 返回設定</button>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="flashProgressFill"></div></div>
        <div class="progress-text" id="flashProgressText"></div>
      </div>
    </div>

    <div class="flash-wrap">
      <div class="flash-card" id="flashCard">
        <div class="flash-face flash-front">
          <span class="flash-list-tag" id="flashListTagFront"></span>
          <div class="flash-word" id="flashWordFront"></div>
          <div class="flash-hint">點擊卡片查看解釋</div>
        </div>
        <div class="flash-face flash-back">
          <span class="flash-list-tag" id="flashListTagBack"></span>
          <div class="flash-pos" id="flashPos"></div>
          <div class="flash-meaning" id="flashMeaning"></div>
        </div>
      </div>
    </div>

    <div class="flash-controls">
      <button class="ctrl-btn dontknow" id="flashDontKnowBtn">✗ 不熟</button>
      <button class="ctrl-btn know" id="flashKnowBtn">✓ 記住了</button>
    </div>
    <div class="flash-controls" style="margin-top:10px;">
      <button class="ctrl-btn" id="flashPrevBtn">‹ 上一個</button>
      <button class="ctrl-btn primary" id="flashNextBtn">下一個 ›</button>
    </div>
    <div class="shuffle-toggle" id="flashShuffleToggle">🔀 隨機順序（點擊切換）</div>
  </div>

  <!-- QUIZ SCREEN -->
  <div id="quizScreen" class="hidden">
    <div class="study-top">
      <button class="back-link" id="quizBackBtn">← 返回設定</button>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="quizProgressFill"></div></div>
        <div class="progress-text" id="quizProgressText"></div>
      </div>
      <div class="score-tag" id="quizScoreTag">0 / 0</div>
    </div>

    <div class="card-panel">
      <div class="quiz-q">
        <div class="quiz-word-tag" id="quizQTag"></div>
        <div class="quiz-word" id="quizWord"></div>
        <div class="quiz-pos" id="quizPos"></div>
      </div>
      <div class="options" id="quizOptions"></div>
      <button class="quiz-next" id="quizNextBtn">下一題 →</button>
    </div>
  </div>

  <!-- SUMMARY SCREEN -->
  <div id="summaryScreen" class="hidden">
    <div class="card-panel summary-hero">
      <div class="summary-score" id="summaryScore">0%</div>
      <div class="summary-label" id="summaryLabel"></div>
    </div>
    <div class="card-panel" id="reviewPanel">
      <div class="section-title">需要複習 Review</div>
      <div class="review-list" id="reviewList"></div>
    </div>
    <button class="start-btn" id="restartBtn">回到設定畫面</button>
  </div>

</div>

const listGrid = document.getElementById('listGrid');
listNames.forEach(ln => {
  const div = document.createElement('div');
  div.className = 'list-chip';
  div.dataset.list = ln;
  div.innerHTML = `${ln.replace('List','L')}<span class="count">${listCounts[ln]}</span>`;
  div.addEventListener('click', () => {
    if (selectedLists.has(ln)) { selectedLists.delete(ln); div.classList.remove('selected'); }
    else { selectedLists.add(ln); div.classList.add('selected'); }
    updateStartBtn();
  });
  listGrid.appendChild(div);
});

document.getElementById('totalCountPill').textContent = VOCAB.length + ' words';

// default: select List1
selectedLists.add('List1');
document.querySelector('.list-chip[data-list="List1"]').classList.add('selected');

document.getElementById('selectAllBtn').addEventListener('click', () => {
  selectedLists = new Set(listNames);
  document.querySelectorAll('.list-chip').forEach(c => c.classList.add('selected'));
  updateStartBtn();
});
document.getElementById('selectNoneBtn').addEventListener('click', () => {
  selectedLists.clear();
  document.querySelectorAll('.list-chip').forEach(c => c.classList.remove('selected'));
  updateStartBtn();
});
document.getElementById('selectRandom5Btn').addEventListener('click', () => {
  selectedLists.clear();
  document.querySelectorAll('.list-chip').forEach(c => c.classList.remove('selected'));
  const shuffled = [...listNames].sort(()=>Math.random()-0.5).slice(0,5);
  shuffled.forEach(ln => {
    selectedLists.add(ln);
    document.querySelector(`.list-chip[data-list="${ln}"]`).classList.add('selected');
  });
  updateStartBtn();
});

function updateStartBtn() {
  document.getElementById('startBtn').disabled = selectedLists.size === 0;
}
updateStartBtn();

// ---------- mode / direction toggles ----------
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    document.getElementById('directionBlock').classList.toggle('hidden', mode !== 'quiz');
  });
});
document.querySelectorAll('.radio-pill').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.radio-pill').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');
    direction = btn.dataset.dir;
  });
});

// ---------- screen switching ----------
function showScreen(id) {
  ['setupScreen','flashScreen','quizScreen','summaryScreen'].forEach(s => {
    document.getElementById(s).classList.toggle('hidden', s !== id);
  });
}

function shuffleArray(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildPool() {
  let items = VOCAB.filter(v => selectedLists.has(v.list));
  if (shuffleOn) items = shuffleArray(items);
  return items;
}

// ---------- START ----------
document.getElementById('startBtn').addEventListener('click', () => {
  if (selectedLists.size === 0) return;
  pool = buildPool();
  idx = 0;
  if (mode === 'flashcard') {
    flashKnown = 0; flashDontKnow = 0;
    showScreen('flashScreen');
    renderFlash();
  } else {
    quizScore = 0; quizAnswered = 0; quizWrongItems = [];
    showScreen('quizScreen');
    renderQuiz();
  }
});

document.getElementById('flashBackBtn').addEventListener('click', () => showScreen('setupScreen'));
document.getElementById('quizBackBtn').addEventListener('click', () => showScreen('setupScreen'));
document.getElementById('restartBtn').addEventListener('click', () => showScreen('setupScreen'));

// ============ FLASHCARD ============
const flashCard = document.getElementById('flashCard');
flashCard.addEventListener('click', () => flashCard.classList.toggle('flipped'));

function renderFlash() {
  if (pool.length === 0) return;
  if (idx >= pool.length) idx = pool.length - 1;
  if (idx < 0) idx = 0;
  const item = pool[idx];
  flashCard.classList.remove('flipped');
  document.getElementById('flashWordFront').textContent = item.word;
  document.getElementById('flashPos').textContent = item.pos ? item.pos + '.' : '';
  document.getElementById('flashMeaning').textContent = item.meaning;
  document.getElementById('flashListTagFront').textContent = item.list;
  document.getElementById('flashListTagBack').textContent = item.list;
  const pct = Math.round(((idx) / pool.length) * 100);
  document.getElementById('flashProgressFill').style.width = pct + '%';
  document.getElementById('flashProgressText').textContent = `${idx+1} / ${pool.length}　✓${flashKnown} ✗${flashDontKnow}`;
}

function flashAdvance() {
  if (idx < pool.length - 1) {
    idx++;
    renderFlash();
  } else {
    // reached end -> loop back to start with a gentle reset
    idx = 0;
    renderFlash();
  }
}

document.getElementById('flashNextBtn').addEventListener('click', flashAdvance);
document.getElementById('flashPrevBtn').addEventListener('click', () => {
  if (idx > 0) { idx--; renderFlash(); }
});
document.getElementById('flashKnowBtn').addEventListener('click', () => {
  flashKnown++;
  flashAdvance();
});
document.getElementById('flashDontKnowBtn').addEventListener('click', () => {
  flashDontKnow++;
  flashAdvance();
});
document.getElementById('flashShuffleToggle').addEventListener('click', function() {
  shuffleOn = !shuffleOn;
  this.classList.toggle('active', shuffleOn);
  pool = buildPool();
  idx = 0;
  renderFlash();
});
document.getElementById('flashShuffleToggle').classList.add('active');

// keyboard support for flashcard
document.addEventListener('keydown', (e) => {
  if (document.getElementById('flashScreen').classList.contains('hidden')) return;
  if (e.code === 'Space') { e.preventDefault(); flashCard.classList.toggle('flipped'); }
  else if (e.code === 'ArrowRight') flashAdvance();
  else if (e.code === 'ArrowLeft') { if (idx>0){idx--; renderFlash();} }
});

// ============ QUIZ ============
function pickDistractors(correctItem, n) {
  const candidates = VOCAB.filter(v => v.word !== correctItem.word);
  const shuffled = shuffleArray(candidates);
  return shuffled.slice(0, n);
}

function renderQuiz() {
  if (pool.length === 0) return;
  if (idx >= pool.length) {
    finishQuiz();
    return;
  }
  quizLocked = false;
  const item = pool[idx];
  const isW2M = direction === 'w2m';

  document.getElementById('quizQTag').textContent = isW2M ? '這個單字的意思是？' : '哪一個單字是這個意思？';
  document.getElementById('quizWord').textContent = isW2M ? item.word : item.meaning;
  document.getElementById('quizWord').classList.toggle('small', !isW2M);
  document.getElementById('quizPos').textContent = (isW2M && item.pos) ? item.pos + '.' : '';

  const distractors = pickDistractors(item, 3);
  const options = shuffleArray([item, ...distractors]);
  const letters = ['A','B','C','D'];

  const optWrap = document.getElementById('quizOptions');
  optWrap.innerHTML = '';
  options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="letter">${letters[i]}</span>${isW2M ? opt.meaning : opt.word}`;
    btn.addEventListener('click', () => selectAnswer(btn, opt, item, isW2M));
    optWrap.appendChild(btn);
  });

  document.getElementById('quizNextBtn').classList.remove('show');
  document.getElementById('quizScoreTag').textContent = `${quizScore} / ${quizAnswered}`;
  const pct = Math.round((idx / pool.length) * 100);
  document.getElementById('quizProgressFill').style.width = pct + '%';
  document.getElementById('quizProgressText').textContent = `${idx+1} / ${pool.length}`;
}

function selectAnswer(btn, opt, correctItem, isW2M) {
  if (quizLocked) return;
  quizLocked = true;
  quizAnswered++;
  const isCorrect = opt.word === correctItem.word;
  if (isCorrect) {
    quizScore++;
    btn.classList.add('correct');
  } else {
    btn.classList.add('wrong');
    quizWrongItems.push(correctItem);
    // highlight correct one too
    [...document.getElementById('quizOptions').children].forEach(b => {
      if (b.textContent.includes(isW2M ? correctItem.meaning : correctItem.word)) {
        b.classList.add('correct');
      }
    });
  }
  [...document.getElementById('quizOptions').children].forEach(b => b.classList.add('locked'));
  document.getElementById('quizScoreTag').textContent = `${quizScore} / ${quizAnswered}`;
  document.getElementById('quizNextBtn').classList.add('show');
}

document.getElementById('quizNextBtn').addEventListener('click', () => {
  idx++;
  renderQuiz();
});

function finishQuiz() {
  showScreen('summaryScreen');
  const pct = quizAnswered ? Math.round((quizScore / quizAnswered) * 100) : 0;
  document.getElementById('summaryScore').textContent = pct + '%';
  document.getElementById('summaryLabel').textContent = `答對 ${quizScore} / ${quizAnswered} 題`;

  const reviewList = document.getElementById('reviewList');
  reviewList.innerHTML = '';
  const reviewPanel = document.getElementById('reviewPanel');
  if (quizWrongItems.length === 0) {
    reviewPanel.classList.add('hidden');
  } else {
    reviewPanel.classList.remove('hidden');
    // dedupe
    const seen = new Set();
    quizWrongItems.forEach(item => {
      if (seen.has(item.word)) return;
      seen.add(item.word);
      const div = document.createElement('div');
      div.className = 'review-item';
      div.innerHTML = `<span class="w">${item.word}</span><span class="m">${item.pos ? item.pos+'. ' : ''}${item.meaning}</span>`;
      reviewList.appendChild(div);
    });
  }
}
</script>
</body>
